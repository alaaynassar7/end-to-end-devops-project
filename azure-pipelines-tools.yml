name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 
  
  # 🔄 UPDATED: Configuration for New Account & Region
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-alaa-2'
  - name: AWS_REGION
    value: 'eu-north-1'
    
  # 🔄 UPDATED: Correct Resource Names
  - name: CLUSTER_NAME
    value: 'alaa-devops-project-cluster'
  - name: TF_BUCKET_NAME
    value: 'alaa-devops-project-tf-state-v2'
  - name: TF_STATE_KEY
    value: 'infra/nonprod/terraform.tfstate'
  
pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# Step 1: Connect to EKS Cluster
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# Step 2: Install Platform Tools (Helm Charts)
- task: AWSShellScript@1
  displayName: 'Install DevOps Toolchain'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # --- 1. Fix AWS CLI Path for Helm Hooks ---
      AWS_BIN=$(which aws)
      echo "Patching kubeconfig to use absolute AWS path: $AWS_BIN"
      sed -i "s|command: aws|command: $AWS_BIN|g" ~/.kube/config || true

      # --- 2. Auto-Tag Private Subnets for Internal Load Balancer ---
      echo "Searching for Private Subnets to apply AWS Load Balancer tags..."
      
      # Retrieve Private Subnet IDs based on Name tag containing 'private'
      PRIVATE_SUBNETS=$(aws ec2 describe-subnets \
        --filters "Name=tag:Name,Values=*private*" "Name=vpc-id,Values=$(aws eks describe-cluster --name $(CLUSTER_NAME) --query cluster.resourcesVpcConfig.vpcId --output text)" \
        --query "Subnets[].SubnetId" --output text)

      if [ ! -z "$PRIVATE_SUBNETS" ]; then
        echo "Found Private Subnets: $PRIVATE_SUBNETS"
        echo "Applying 'kubernetes.io/role/internal-elb' tag..."
        aws ec2 create-tags --resources $PRIVATE_SUBNETS --tags Key=kubernetes.io/role/internal-elb,Value=1
      else
        echo "⚠️ Warning: Could not auto-detect private subnets. Ensure subnets are manually tagged."
      fi

      echo "--- 3. Installing Nginx Ingress Controller (Internal Mode) ---"
      # 🔄 UPDATED: Configuring as Internal NLB for Zero-Trust
      helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --set controller.resources.requests.memory=100Mi \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"="nlb" \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-internal"="true" \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-scheme"="internal"

      # --- 4. Installing Other Tools (Datadog, SonarQube, etc.) ---
      # (Existing Logic kept as is)
      
      echo "--- 6. Installing ArgoCD ---"
      n=0
      until [ "$n" -ge 3 ]; do
         helm upgrade --install argocd argo-cd \
           --repo https://argoproj.github.io/argo-helm \
           --namespace argocd --create-namespace \
           --wait=false && break
         n=$((n+1))
         echo "Retrying ArgoCD installation (Attempt $n/3)..."
         sleep 5
      done

# Step 3: Automation - Link Internal NLB to API Gateway via Terraform
# 🔄 REPLACED: NodePort Logic removed -> Added NLB ARN Fetching Logic
- task: AWSShellScript@1
  displayName: 'Fetch NLB ARN and Update tfvars'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -e

      echo "--- 1. Fetching Internal NLB Details ---"
      
      # Wait loop for LoadBalancer Hostname (Timeout: 5 minutes)
      timeout=300
      end=$((SECONDS + timeout))
      
      # Check if Ingress exists first
      while [ -z "$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)" ]; do
        if [ $SECONDS -ge $end ]; then echo "Timeout waiting for NLB DNS"; exit 1; fi
        echo "Waiting for Internal NLB DNS..."
        sleep 10
      done
      
      NLB_DNS=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
      
      if [ ! -z "$NLB_DNS" ]; then
        echo "Found NLB DNS: $NLB_DNS"
        echo "Fetching NLB Listener ARN from AWS..."
        
        # 1. Get Load Balancer ARN using the DNS Name
        LB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?DNSName=='$NLB_DNS'].LoadBalancerArn" --output text)
        
        if [ -z "$LB_ARN" ]; then echo "❌ Error: Could not find Load Balancer ARN"; exit 1; fi
        
        # 2. Get Listener ARN (Targeting Port 80 for HTTP)
        LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn $LB_ARN --query "Listeners[?Port==\`80\`].ListenerArn" --output text)
        
        if [ -z "$LISTENER_ARN" ]; then echo "❌ Error: Could not find Listener ARN on port 80"; exit 1; fi
        
        echo "Updating Terraform variables with Listener ARN: $LISTENER_ARN"
        cd terraform
        
        # Update nlb_listener_arn in tfvars file with the ARN
        sed -i "s|^\s*nlb_listener_arn.*|nlb_listener_arn = \"$LISTENER_ARN\"|g" nonprod.tfvars
        
        echo "--- 2. Applying Terraform Changes ---"
        # Initialize Terraform with explicit Backend Config
        terraform init \
           -backend-config="bucket=$(TF_BUCKET_NAME)" \
           -backend-config="key=$(TF_STATE_KEY)" \
           -backend-config="region=$(AWS_REGION)" \
           -reconfigure

        # Apply Terraform changes to link API Gateway to NLB
        terraform apply -var-file="nonprod.tfvars" -auto-approve
        
        echo "--- 3. GitOps: Syncing Changes to Repository ---"
        git config --global user.email "alaaynassar7@gmail.com"
        git config --global user.name "Alaa Nassar"
        
        git add nonprod.tfvars
        
        # Commit and Push
        git commit -m "chore: update Internal NLB ARN in tfvars [skip ci]" || echo "No changes to commit"
        
        git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main
        
        echo "✅ Integration URI updated successfully!"
      else
        echo "❌ Error: Internal NLB DNS could not be retrieved."
        exit 1
      fi