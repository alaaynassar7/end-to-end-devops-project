name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 
  
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-alaa-2'
  - name: AWS_REGION
    value: 'eu-north-1'
    
  - name: CLUSTER_NAME
    value: 'alaa-devops-project-cluster'
  - name: TF_BUCKET_NAME
    value: 'alaa-devops-project-tf-state-v2'
  - name: TF_STATE_KEY
    value: 'infra/nonprod/terraform.tfstate'
  
pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# 1. Install Terraform
- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: latest

# 2. Update Kubeconfig
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail
      
      # Install AWS CLI if missing
      if ! command -v aws &> /dev/null; then
          echo "Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install || ./aws/install -i ~/aws-cli -b ~/bin
          echo "##vso[task.prependpath]$HOME/bin"
      fi

      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# 3. Install Helm
- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

# 4. Install Nginx Ingress (Radwa Style: Standard Public LB)
- task: AWSShellScript@1
  displayName: 'Install Nginx Ingress'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # Error handling
      handle_error() {
        echo "##[error] Nginx Ingress deployment failed!"
        kubectl get all -n ingress-nginx
        kubectl describe pod -l app.kubernetes.io/name=ingress-nginx -n ingress-nginx || true
        kubectl get events -n ingress-nginx --sort-by='.lastTimestamp' || true
      }
      trap 'handle_error' ERR

      # Fix AWS CLI path in Kubeconfig
      AWS_BIN=$(which aws)
      sed -i "s|command: aws|command: $AWS_BIN|g" ~/.kube/config || true

      echo "Installing Nginx Ingress Controller (Standard Mode)..."
      
      helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --version 4.11.3 \
        --set controller.service.type=LoadBalancer \
        --wait \
        --timeout 15m \
        --debug

# 5. Fetch LB DNS & Update Terraform
- task: AWSShellScript@1
  displayName: 'Link API Gateway to Load Balancer'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail
      cd terraform

      echo "Fetching Load Balancer DNS..."
      
      # Wait loop
      timeout=300
      end=$((SECONDS + timeout))
      while [ -z "$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)" ]; do
        if [ $SECONDS -ge $end ]; then echo 
        echo "Waiting for Load Balancer DNS..."
        sleep 10
      done

      NLB_DNS=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
      echo "Found LB: $NLB_DNS"
      
      echo "Fetching LB ARN..."
      LB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?DNSName=='$NLB_DNS'].LoadBalancerArn" --output text || echo "")
      
      if [ -z "$LB_ARN" ]; then
         echo "
         LISTENER_ARN="arn:aws:elasticloadbalancing:placeholder-classic-lb"
      else
         echo "Fetching Listener ARN..."
         LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$LB_ARN" --query "Listeners[?Port==\`80\`].ListenerArn" --output text)
      fi
      
      echo "Updating tfvars with: $LISTENER_ARN"
      sed -i "s|^\s*nlb_listener_arn.*|nlb_listener_arn = \"$LISTENER_ARN\"|g" nonprod.tfvars
      
      echo "Running Terraform Apply..."
      terraform init \
         -backend-config="bucket=$(TF_BUCKET_NAME)" \
         -backend-config="key=$(TF_STATE_KEY)" \
         -backend-config="region=$(AWS_REGION)" \
         -reconfigure

      terraform apply -var-file="nonprod.tfvars" -auto-approve
      
      # GitOps Push
      git config --global user.email "alaaynassar7@gmail.com"
      git config --global user.name "Alaa Nassar"
      git add nonprod.tfvars
      git commit -m "chore: update LB Details [skip ci]" || echo "No changes"
      git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main