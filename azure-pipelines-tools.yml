name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 
  
  # --- Project Variables ---
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-alaa-2'
  - name: AWS_REGION
    value: 'eu-north-1'
    
  - name: CLUSTER_NAME
    value: 'alaa-devops-project-cluster'
  - name: TF_BUCKET_NAME
    value: 'alaa-devops-project-tf-state-v2'
  - name: TF_STATE_KEY
    value: 'infra/nonprod/terraform.tfstate'
  
pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# 1. Install Terraform
- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: latest

# 2. Update Kubeconfig & Install AWS CLI
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail
      
      # Install AWS CLI if missing (Crucial for Agent)
      if ! command -v aws &> /dev/null; then
          echo "Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install || ./aws/install -i ~/aws-cli -b ~/bin
          echo "##vso[task.prependpath]$HOME/bin"
      fi

      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# 3. Install Helm
- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

# 4. Install Tools & Nginx (Attempting NLB)
- task: AWSShellScript@1
  displayName: 'Install DevOps Tools (Nginx NLB, Argo, Sonar)'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # Error handling function
      handle_error() {
        echo "##[error] Deployment failed!"
        kubectl get all -n ingress-nginx
        kubectl describe pod -l app.kubernetes.io/name=ingress-nginx -n ingress-nginx || true
        kubectl get events -n ingress-nginx --sort-by='.lastTimestamp' || true
      }
      trap 'handle_error' ERR

      # Fix AWS CLI path in Kubeconfig
      AWS_BIN=$(which aws)
      sed -i "s|command: aws|command: $AWS_BIN|g" ~/.kube/config || true

      # --- A. Auto-Tagging Private Subnets (THE SECRET FOR NLB) ---
      echo "--- Auto-Tagging Private Subnets for Internal NLB ---"
      PRIVATE_SUBNETS=$(aws ec2 describe-subnets \
        --filters "Name=tag:Name,Values=*private*" "Name=vpc-id,Values=$(aws eks describe-cluster --name $(CLUSTER_NAME) --query cluster.resourcesVpcConfig.vpcId --output text)" \
        --query "Subnets[].SubnetId" --output text)
      
      if [ ! -z "$PRIVATE_SUBNETS" ]; then
        echo "Tagging Subnets: $PRIVATE_SUBNETS"
        # Tag required for Internal Load Balancers
        aws ec2 create-tags --resources $PRIVATE_SUBNETS --tags Key=kubernetes.io/role/internal-elb,Value=1
      else
        echo "##[warning] No private subnets found to tag! NLB might fail."
      fi

      # --- B. Install Nginx Ingress (Internal NLB Mode) ---
      echo "--- Installing Nginx Ingress Controller (Internal NLB) ---"
      helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --version 4.11.3 \
        --set controller.service.type=LoadBalancer \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"="nlb" \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-internal"="true" \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-scheme"="internal" \
        --set controller.admissionWebhooks.enabled=false \
        --wait \
        --timeout 15m \
        --debug

      # --- C. Install ArgoCD ---
      echo "--- Installing ArgoCD ---"
      helm upgrade --install argocd argo-cd \
        --repo https://argoproj.github.io/argo-helm \
        --namespace argocd --create-namespace \
        --set server.service.type=ClusterIP \
        --set server.ingress.enabled=true \
        --set server.ingress.ingressClassName=nginx \
        --wait \
        --timeout 10m

      # --- D. Install SonarQube ---
      echo "--- Installing SonarQube ---"
      cat > sonarqube-values.yaml <<EOF
      monitoringPasscode: changeMe
      community:
        enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - name: ""
            path: "/sonarqube"
      sonarWebContext: /sonarqube
      persistence:
        enabled: false
      EOF

      helm upgrade --install sonarqube sonarqube \
        --repo https://SonarSource.github.io/helm-chart-sonarqube \
        --namespace sonarqube --create-namespace \
        --wait --timeout 10m \
        --values sonarqube-values.yaml

# 5. Fetch NLB ARN & Update Terraform
- task: AWSShellScript@1
  displayName: 'Link API Gateway to Load Balancer'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -e # Exit on error
      cd terraform

      echo "Fetching Load Balancer DNS..."
      
      # Robust Wait Loop (Fixed Syntax)
      MAX_RETRIES=30
      COUNT=0
      NLB_DNS=""
      
      while [ $COUNT -lt $MAX_RETRIES ]; do
        NLB_DNS=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
        
        if [ -n "$NLB_DNS" ]; then
            echo "Found LB DNS: $NLB_DNS"
            break
        fi
        
        echo "Waiting for Internal NLB DNS... ($COUNT/$MAX_RETRIES)"
        sleep 10
        COUNT=$((COUNT+1))
      done

      if [ -z "$NLB_DNS" ]; then
        echo "##[error] Timeout waiting for NLB DNS. Check Kubernetes Events."
        exit 1
      fi
      
      echo "Fetching LB ARN..."
      # Fetch ARN using the DNS Name
      LB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?DNSName=='$NLB_DNS'].LoadBalancerArn" --output text)
      
      if [ -z "$LB_ARN" ]; then
         echo "##[error] Could not find ARN for DNS: $NLB_DNS. Is it a Classic LB?"
         exit 1
      fi

      echo "Fetching Listener ARN..."
      LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$LB_ARN" --query "Listeners[?Port==\`80\`].ListenerArn" --output text)
      
      if [ -z "$LISTENER_ARN" ]; then
         echo "##[error] Could not find Listener ARN on port 80"
         exit 1
      fi
      
      echo "Found Listener ARN: $LISTENER_ARN"
      
      echo "Updating tfvars..."
      # Ensure file exists
      touch nonprod.tfvars
      
      # Replace existing or append new
      if grep -q "nlb_listener_arn" nonprod.tfvars; then
        sed -i "s|^\s*nlb_listener_arn.*|nlb_listener_arn = \"$LISTENER_ARN\"|g" nonprod.tfvars
      else
        echo "" >> nonprod.tfvars
        echo "nlb_listener_arn = \"$LISTENER_ARN\"" >> nonprod.tfvars
      fi
      
      # Remove integration_uri if it exists (to avoid conflict with ARN logic)
      sed -i "s|^\s*integration_uri.*|# integration_uri replaced by ARN|g" nonprod.tfvars || true
      
      echo "Running Terraform Apply..."
      terraform init \
         -backend-config="bucket=$(TF_BUCKET_NAME)" \
         -backend-config="key=$(TF_STATE_KEY)" \
         -backend-config="region=$(AWS_REGION)" \
         -reconfigure

      terraform apply -var-file="nonprod.tfvars" -auto-approve
      
      # GitOps Push
      git config --global user.email "alaaynassar7@gmail.com"
      git config --global user.name "Alaa-Bot"
      git add nonprod.tfvars
      git commit -m "chore: update Internal NLB ARN [skip ci]" || echo "No changes"
      git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main