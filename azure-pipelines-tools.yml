name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 

pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# Step 1: Connect to EKS Cluster
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# Step 2: Install Platform Tools 
- task: AWSShellScript@1
  displayName: 'Install DevOps Toolchain'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # --- Fix AWS CLI Path (Taken from Bahi's code) ---
      # This fixes "command not found" errors during Helm hooks
      AWS_BIN=$(which aws)
      echo "Patching kubeconfig to use: $AWS_BIN"
      sed -i "s|command: aws|command: $AWS_BIN|g" ~/.kube/config || true

      echo "--- 1. Installing Nginx Ingress Controller ---"
      helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"="nlb" \
        --wait

      echo "--- 2. Installing Datadog Agent ---"
      kubectl create secret generic datadog-secret --from-literal api-key=$(DATADOG_API_KEY) --namespace default --dry-run=client -o yaml | kubectl apply -f -
      
      # Cleanup & Install
      helm uninstall datadog-agent --namespace default >/dev/null 2>&1 || true
      
      echo "Deploying Datadog..."
      helm upgrade --install datadog-agent datadog \
        --repo https://helm.datadoghq.com \
        --set datadog.apiKeyExistingSecret='datadog-secret' \
        --set datadog.site='us5.datadoghq.com' \
        --set datadog.clusterName=$(CLUSTER_NAME) \
        --set datadog.tags='env:nonprod' \
        --set datadog.clusterChecks.enabled=true \
        --set datadog.orchestratorExplorer.enabled=true \
        --set clusterAgent.enabled=true \
        --set clusterAgent.replicas=1

      echo "--- 3. Installing SonarQube (Bahi's Configuration) ---"
      
      cat > sonarqube-values.yaml <<EOF
      monitoringPasscode: changeMe
      community:
        enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - name: ""
            path: "/sonarqube"
        annotations:
           nginx.ingress.kubernetes.io/proxy-body-size: "64m"
      sonarWebContext: /sonarqube
      persistence:
        enabled: false
      EOF

      echo "Deploying SonarQube..."
      if ! helm upgrade --install sonarqube sonarqube \
        --repo https://SonarSource.github.io/helm-chart-sonarqube \
        --namespace sonarqube --create-namespace \
        --wait --timeout 10m \
        -f sonarqube-values.yaml; then
           echo "❌ SonarQube installation failed! Fetching logs..."
           kubectl get pods -n sonarqube
           kubectl describe pods -n sonarqube
           kubectl logs -n sonarqube -l app.kubernetes.io/name=sonarqube --tail=50
           exit 1
      fi

      echo "Deploying Nexus..."
      helm upgrade --install nexus sonatype-nexus \
        --repo https://oteemo.github.io/charts \
        --namespace nexus --create-namespace \
        --set persistence.enabled=false \
        --wait=false

      echo "--- 4. Installing GitOps & Security Tools ---"
      
      echo "Deploying ArgoCD..."
      n=0
      until [ "$n" -ge 3 ]
      do
         helm upgrade --install argocd argo-cd \
           --repo https://argoproj.github.io/argo-helm \
           --namespace argocd --create-namespace \
           --wait=false && break
         n=$((n+1))
         echo "Retrying ArgoCD ($n/3)..."
         sleep 5
      done

      echo "Deploying Vault..."
      helm upgrade --install vault vault \
        --repo https://helm.releases.hashicorp.com \
        --namespace vault --create-namespace \
        --set "server.dev.enabled=true" \
        --wait=false
      
      echo "--- 5. Installing External Secrets & Database ---"
      helm upgrade --install external-secrets external-secrets \
        --repo https://charts.external-secrets.io \
        --namespace external-secrets --create-namespace \
        --set installCRDs=true \
        --wait=false

      helm upgrade --install mongodb mongodb \
        --repo https://charts.bitnami.com/bitnami \
        --namespace database --create-namespace \
        --set persistence.enabled=false \
        --wait=false

# Step 3: Automation - Link Load Balancer DNS to AWS API Gateway
- task: AWSShellScript@1
  displayName: 'Link API Gateway to NLB'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      echo "Retrieving NLB DNS..."
      sleep 30 
      
      # Wait loop for LoadBalancer Hostname (Timeout: 5 minutes)
      timeout=300
      end=$((SECONDS + timeout))
      while [ -z "$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)" ]; do
        if [ $SECONDS -ge $end ]; then echo "Timed out waiting for NLB DNS"; exit 1; fi
        echo "Waiting for NLB DNS..."
        sleep 10
      done
      
      NLB_DNS=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
      
      if [ ! -z "$NLB_DNS" ]; then
        echo "Found NLB: $NLB_DNS"
        echo "Updating Terraform variables..."
        
        cd terraform
        
        # Robust sed command
        sed -i "s|^\s*integration_uri.*|integration_uri = \"http://$NLB_DNS\"|g" nonprod.tfvars
        
        # Apply Terraform changes
        terraform init -reconfigure
        terraform apply -var-file="nonprod.tfvars" -auto-approve
        
        # GitOps: Push updated tfvars back to repository
        git config --global user.email "alaaynassar7@gmail.com"
        git config --global user.name "Alaa-Tools-Bot"
        git add nonprod.tfvars
        git commit -m "chore: update NLB DNS in tfvars [skip ci]"
        git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main
        
        echo "✅ Integration URI updated successfully!"
      else
        echo "❌ Error: NLB DNS could not be retrieved."
        exit 1
      fi