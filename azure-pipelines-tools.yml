name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 
  
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-alaa-2'
  - name: AWS_REGION
    value: 'eu-north-1'
    
  - name: CLUSTER_NAME
    value: 'alaa-devops-project-cluster'
  - name: TF_BUCKET_NAME
    value: 'alaa-devops-project-tf-state-v2'
  - name: TF_STATE_KEY
    value: 'infra/nonprod/terraform.tfstate'
  
pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# 1. Install Terraform
- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: latest

# 2. Update Kubeconfig (Simplified)
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -e
      
      echo "Checking AWS CLI version..."
      aws --version
      
      echo "Updating Kubeconfig for cluster: $(CLUSTER_NAME)..."
      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)
      
      echo "Verifying connection..."
      kubectl get svc
      
      # Install AWS CLI
      if ! command -v aws &> /dev/null; then
          echo "Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install || ./aws/install -i ~/aws-cli -b ~/bin
          echo "##vso[task.prependpath]$HOME/bin"
      fi

      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# 3. Install Helm
- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

# 4. Install Tools & Nginx (Classic Mode - Like Feb 6th)
- task: AWSShellScript@1
  displayName: 'Install DevOps Tools (Classic LB)'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # Error handling
      handle_error() {
        echo "##[error] Deployment failed!"
        kubectl get all -n ingress-nginx
        kubectl describe pod -l app.kubernetes.io/name=ingress-nginx -n ingress-nginx || true
        kubectl get events -n ingress-nginx --sort-by='.lastTimestamp' || true
      }
      trap 'handle_error' ERR

      # Fix AWS CLI path
      AWS_BIN=$(which aws)
      sed -i "s|command: aws|command: $AWS_BIN|g" ~/.kube/config || true

      # --- Install Nginx Ingress (Classic LB) ---
      echo "--- Installing Nginx Ingress Controller (Classic Mode) ---"
      helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --version 4.11.3 \
        --set controller.service.type=LoadBalancer \
        --wait \
        --timeout 15m \
        --debug

      # --- Install ArgoCD ---
      echo "--- Installing ArgoCD ---"
      helm upgrade --install argocd argo-cd \
        --repo https://argoproj.github.io/argo-helm \
        --namespace argocd --create-namespace \
        --set server.service.type=ClusterIP \
        --set server.ingress.enabled=true \
        --set server.ingress.ingressClassName=nginx \
        --wait \
        --timeout 10m

      # --- Install SonarQube ---
      echo "--- Installing SonarQube ---"
      cat > sonarqube-values.yaml <<EOF
      monitoringPasscode: changeMe
      community:
        enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - name: ""
            path: "/sonarqube"
      sonarWebContext: /sonarqube
      persistence:
        enabled: false
      EOF

      helm upgrade --install sonarqube sonarqube \
        --repo https://SonarSource.github.io/helm-chart-sonarqube \
        --namespace sonarqube --create-namespace \
        --wait --timeout 10m \
        --values sonarqube-values.yaml

# 5. Fetch LB DNS & Update Terraform
- task: AWSShellScript@1
  displayName: 'Link API Gateway to Load Balancer'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -e
      cd terraform

      echo "Fetching Load Balancer DNS..."
      
      # Wait Loop for DNS
      timeout=300
      end=$((SECONDS + timeout))
      
      while true; do
        LB_HOSTNAME=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
        
        if [ -n "$LB_HOSTNAME" ]; then
            echo "Found Classic LB: $LB_HOSTNAME"
            break
        fi
        
        if [ $SECONDS -ge $end ]; then 
            echo "##[error]Timeout waiting for LB DNS"
            exit 1
        fi
        
        echo "Waiting for Classic LB DNS..."
        sleep 10
      done

      # Use DNS directly (Classic LB works best with HTTP URL integration)
      NEW_URI="http://$LB_HOSTNAME"
      echo "Setting Integration URI to: $NEW_URI"
      
      # Update integration_uri in nonprod.tfvars
      touch nonprod.tfvars
      
      # Remove nlb_listener_arn to force Terraform to use the URL logic
      sed -i "s|^\s*nlb_listener_arn.*|# nlb_listener_arn removed|g" nonprod.tfvars || true
      
      # Update/Add integration_uri
      if grep -q "integration_uri" nonprod.tfvars; then
        sed -i "s|^\s*integration_uri.*|integration_uri = \"$NEW_URI\"|g" nonprod.tfvars
      else
        echo "" >> nonprod.tfvars
        echo "integration_uri = \"$NEW_URI\"" >> nonprod.tfvars
      fi
      
      echo "Running Terraform Apply..."
      terraform init \
         -backend-config="bucket=$(TF_BUCKET_NAME)" \
         -backend-config="key=$(TF_STATE_KEY)" \
         -backend-config="region=$(AWS_REGION)" \
         -reconfigure

      terraform apply -var-file="nonprod.tfvars" -auto-approve
      
      # GitOps Push
      git config --global user.email "alaaynassar7@gmail.com"
      git config --global user.name "Alaa Nassar"
      git add nonprod.tfvars
      git commit -m "chore: update Classic LB DNS [skip ci]" || echo "No changes"
      git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main