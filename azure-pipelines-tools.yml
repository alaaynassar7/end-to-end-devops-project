name: $(Date:yyyyMMdd)$(Rev:.r)-DevOps-Tools-Infrastructure
trigger: none 

variables:
  - group: 'My Vars' 
  
pool:
  name: 'Self hosted pools'
  demands:
    - Agent.Name -equals alaaynassar-VMware

steps:
- checkout: self
  persistCredentials: true

# Step 1: Connect to EKS Cluster
- task: AWSShellScript@1
  displayName: 'Update Kubeconfig'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      aws eks update-kubeconfig --region $(AWS_REGION) --name $(CLUSTER_NAME)

# Step 2: Install Platform Tools via Helm (Optimized for t3.small)
- task: AWSShellScript@1
  displayName: 'Install DevOps Toolchain'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      set -euo pipefail

      # Pre-requisite: Add Helm Repositories
      helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      helm repo add datadog https://helm.datadoghq.com
      helm repo add external-secrets https://charts.external-secrets.io
      helm repo add hashicorp https://helm.releases.hashicorp.com
      helm repo update

      # A. Install Nginx Ingress Controller (Load Balancer Entry Point)
      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --set controller.resources.requests.memory=100Mi \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"="nlb" \
        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-scheme"="internet-facing"

      # B. Install Datadog Agent (Monitoring & Observability)
      kubectl create secret generic datadog-secret --from-literal api-key=$(DATADOG_API_KEY) --namespace default || true
      helm upgrade --install datadog-agent datadog/datadog \
        --set datadog.apiKeyExistingSecret='datadog-secret' \
        --set datadog.site='us5.datadoghq.com' \
        --set datadog.clusterName=$(CLUSTER_NAME) \
        --set datadog.tags='env:nonprod' \
        --set datadog.resources.requests.memory=150Mi

      # C. Install SonarQube & Nexus (No Persistence to save RAM)
      helm upgrade --install sonarqube sonarqube/sonarqube --namespace sonarqube --create-namespace \
        --set persistence.enabled=false --set resources.requests.memory=600Mi --wait=false

      helm upgrade --install nexus oteemo/sonatype-nexus --namespace nexus --create-namespace \
        --set persistence.enabled=false --set nexus.resources.requests.memory=350Mi --wait=false

      # D. Install GitOps & Security Tools (ArgoCD, Vault, MongoDB)
      helm upgrade --install argocd argo/argo-cd --namespace argocd --create-namespace --set server.resources.requests.memory=200Mi
      helm upgrade --install vault hashicorp/vault --namespace vault --create-namespace --set "server.dev.enabled=true"
      
      # E. Install External Secrets Operator (Step 7 Requirement)
      helm upgrade --install external-secrets external-secrets/external-secrets \
        --namespace external-secrets --create-namespace \
        --set installCRDs=true

      helm upgrade --install mongodb bitnami/mongodb --namespace database --create-namespace --set persistence.enabled=false

# Step 3: Automation - Link Load Balancer DNS to AWS API Gateway
- task: AWSShellScript@1
  displayName: 'Link API Gateway to NLB'
  inputs:
    awsCredentials: '$(AWS_SERVICE_CONNECTION)'
    regionName: '$(AWS_REGION)'
    scriptType: 'inline'
    inlineScript: |
      echo "Retrieving NLB DNS..."
      sleep 60 # Wait for DNS to be provisioned by AWS
      
      # Wait loop for LoadBalancer Hostname (Timeout: 5 minutes)
      timeout=300
      end=$((SECONDS + timeout))
      while [ -z "$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)" ]; do
        if [ $SECONDS -ge $end ]; then echo "Timed out waiting for NLB DNS"; exit 1; fi
        echo "Waiting for NLB DNS..."
        sleep 10
      done
      
      NLB_DNS=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
      
      if [ ! -z "$NLB_DNS" ]; then
        echo "Updating Terraform variables with DNS: $NLB_DNS"
        cd terraform
        # Update integration_uri in tfvars file
        sed -i "s|^\s*integration_uri.*|integration_uri = \"http://$NLB_DNS\"|g" nonprod.tfvars
        
        # Apply Terraform changes to sync API Gateway
        terraform init -reconfigure
        terraform apply -var-file="nonprod.tfvars" -auto-approve
        
        # GitOps: Push updated tfvars back to repository
        git config --global user.email "alaaynassar7@gmail.com"
        git config --global user.name "Alaa-Tools-Bot"
        git add nonprod.tfvars
        git commit -m "chore: update NLB DNS in tfvars [skip ci]"
        git push https://$(MY_GITHUB_PAT)@github.com/alaaynassar7/end-to-end-devops-project.git HEAD:main
      else
        echo "Error: NLB DNS could not be retrieved."
        exit 1
      fi