name: Deploy Cluster Tools

on:
  workflow_dispatch: 

env:
  REGION: 'us-east-1'
  CLUSTER_NAME: 'alaa-devops-project-cluster'

jobs:
  deploy-addons:
    name: 'Setup Helm, K8s and Add-ons'
    runs-on: [self-hosted, "alaaynassar-VMware"]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
    
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Install Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Deploy Tools (Ingress & ArgoCD)
        run: |
          # 1. AUTHENTICATION
          echo "Retrieving EKS credentials..."
          aws eks update-kubeconfig --region ${{ env.REGION }} --name ${{ env.CLUSTER_NAME }}
          
          # 2. VALIDATION
          echo "Verifying cluster nodes..."
          kubectl get nodes

          # 3. INGRESS: Deploy Nginx Ingress Controller
          echo "Installing Nginx Ingress Controller..."
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"="nlb" \
            --wait

          # 4. GitOps: Install Argo CD
          echo "Installing Argo CD..."
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          
          echo "Waiting for Argo CD availability..."
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s

          # 5. OUTPUTS
          echo "------------------------------------------------------------"
          echo "DEPLOYMENT COMPLETE"
          echo "------------------------------------------------------------"
          
          echo "Load Balancer DNS Name:"
          kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo -e "\n"

          echo "ArgoCD Initial Admin Password:"
          kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
          echo -e "\n"
