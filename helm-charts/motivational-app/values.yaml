replicaCount: 1

image:
  repository: 548135082630.dkr.ecr.us-east-1.amazonaws.com/motivational-app
  pullPolicy: Always
  tag: "2108"

imagePullSecrets:
  - name: ecr-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 5000 

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 10
